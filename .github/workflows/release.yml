name: Release

on:
  workflow_dispatch:
    inputs:
      driver_patch:
        description: Driver patch component for v0.<datafusion-version>.<driver-patch>
        required: true
        type: string
      publish:
        description: Commit, tag, and publish after artifact verification
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  native:
    name: Native archive ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-15
          - platform: darwin-amd64
            runner: macos-13
          - platform: linux-amd64
            runner: ubuntu-22.04
          - platform: linux-arm64
            runner: ubuntu-22.04-arm
          - platform: windows-amd64
            runner: windows-2025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.platform != 'windows-amd64' }}

      - uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.platform == 'windows-amd64' }}
        with:
          targets: x86_64-pc-windows-gnu

      - uses: msys2/setup-msys2@v2
        if: ${{ matrix.platform == 'windows-amd64' }}
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            make
            mingw-w64-x86_64-gcc

      - name: Build and test bundled archive
        if: ${{ matrix.platform != 'windows-amd64' }}
        run: make test

      - name: Build and test bundled archive
        if: ${{ matrix.platform == 'windows-amd64' }}
        shell: msys2 {0}
        env:
          CGO_ENABLED: "1"
          CC: gcc
          CARGO_BUILD_TARGET: x86_64-pc-windows-gnu
        run: make test

      - name: Upload native archive
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: internal/native/lib/${{ matrix.platform }}/libdatafusion_go.a
          if-no-files-found: error

  release:
    name: Cut release
    needs: native
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: dtolnay/rust-toolchain@stable

      - name: Compute release tag
        id: version
        run: |
          set -euo pipefail
          encoded="$(awk -F'"' '/DataFusionVersionEncoded/ {print $2}' version.go)"
          patch="${{ inputs.driver_patch }}"
          case "$patch" in
            ''|*[!0-9]*)
              echo "driver_patch must be a non-negative integer" >&2
              exit 1
              ;;
          esac
          tag="v0.${encoded}.${patch}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "tag ${tag} already exists" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download native archives
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: internal/native/lib
          merge-multiple: false

      - name: Place native archives
        run: |
          set -euo pipefail
          for dir in internal/native/lib/native-*; do
            platform="${dir##*/native-}"
            mkdir -p "internal/native/lib/${platform}"
            mv "${dir}/libdatafusion_go.a" "internal/native/lib/${platform}/libdatafusion_go.a"
            rmdir "${dir}"
          done
          find internal/native/lib -name libdatafusion_go.a -print | sort

      - name: Generate checksums
        run: make checksums

      - name: Verify checksums
        run: make verify.checksums

      - name: Verify downloaded release artifacts
        run: make verify.release.downloaded

      - name: Tag release
        if: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets=(internal/native/lib/SHA256SUMS)
          while IFS= read -r file; do
            assets+=("$file")
          done < <(find internal/native/lib -name libdatafusion_go.a -print | sort)
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "DataFusion $(awk -F'\"' '/DataFusionVersion / {print $2}' version.go)" \
            "${assets[@]}"
